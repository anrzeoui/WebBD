<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoppy Admin</title>
  <link rel="stylesheet" href="style1.css">
</head>
<body>

  <div class="admin-layout">
    
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Shoppy Admin</h2>
      </div>
      <ul class="sidebar-menu">
        <li><a href="#" class="active">Барааны ангилал</a></li>
        <li><a href="#">Барааны жагсаалт</a></li>
        <li><a href="#">Захиалгын жагсаалт</a></li>
        <li><a href="#">Үйлүүлэгчийн жагсаалт</a></li>
        <li><a href="#">Төлбөрийн жагсаалт</a></li>
        <li><a href="#">Мэдээллийн жагсаалт</a></li>
      </ul>
      <div class="sidebar-footer">
        <a href="#">Гарах</a>
      </div>
    </aside>

    <div class="main-wrapper">
      
      <header class="topbar">
        <div class="topbar-search">
          <input type="text" placeholder="Хайх...">
          <button>🔍</button>
        </div>
        <div class="topbar-actions">
          <div class="admin-profile">
            <div class="avatar">А</div>
            <span>Админ</span>
          </div>
        </div>
      </header>

      <main class="content-area"></main>

    </div>
  </div>

</body>
</html>
